<!DOCTYPE html>

<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.bedankt-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8rem 5% 6rem;
  background: var(--soft);
}
.bedankt-card {
  background: var(--w);
  border-radius: 20px;
  padding: 3.5rem 3rem;
  max-width: 520px;
  width: 100%;
  text-align: center;
  box-shadow: 0 24px 64px rgba(5,150,237,.1), 0 4px 16px rgba(0,0,0,.05);
  border: 1.5px solid var(--gray);
}
.bedankt-icon {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: rgba(5,150,237,.1);
  border: 2px solid rgba(5,150,237,.2);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.75rem;
}
.bedankt-card h1 {
  font-size: 1.6rem; font-weight: 900;
  letter-spacing: -.5px; color: var(--text);
  margin-bottom: .75rem;
}
.bedankt-card p {
  font-size: .9rem; line-height: 1.75;
  color: var(--dim); margin-bottom: 2rem;
}
.bedankt-card p strong { color: var(--text); }
.bedankt-back {
  display: inline-flex; align-items: center; gap: .45rem;
  background: var(--b); color: #fff;
  padding: .85rem 1.9rem; border-radius: 9px;
  font-weight: 700; font-size: .87rem; text-decoration: none;
  letter-spacing: .2px;
  box-shadow: 0 8px 26px rgba(5,150,237,.3);
  transition: background .15s, transform .2s;
}
.bedankt-back:hover { background: var(--bh); transform: translateY(-2px); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="n-logo">
    <img src="Logo.png" alt="Alnas Cleaning" class="n-logo-img">
  </a>
</nav>

<div class="bedankt-wrap">
  <div class="bedankt-card">
    <div class="bedankt-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--b)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>Bedankt voor uw aanvraag!</h1>
    <p>Wij hebben uw bericht goed ontvangen.<br>
    <strong>U hoort binnen de dag van ons</strong> met een persoonlijk voorstel op maat.</p>
    <p>Dringende vragen? Bel ons op <a href="tel:0382882226" style="color:var(--b);font-weight:600;">03 828 82 26</a> of WhatsApp <a href="https://wa.me/32485919353" style="color:var(--b);font-weight:600;">0485 91 93 53</a>.</p>
    <a href="index.html" class="bedankt-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Terug naar de website
    </a>
  </div>
</div>

</body>
